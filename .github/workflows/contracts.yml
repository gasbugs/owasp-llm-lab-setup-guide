name: Lab contracts

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install 'jsonschema==4.25.1'
      - run: python tools/lab_contract.py validate
      - run: python -m unittest tests.unit.test_lab_contracts -v
      - run: python -m unittest tests.unit.test_run_lab_contract -v
